<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TicketZone | Events</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

<header class="hero">

    <nav class="nav">
        <h1 class="logo">TicketZone</h1>

        <ul class="nav-links">
            <li><a th:href="@{/home}">Home</a></li>
            <li><a th:href="@{/events}">Events</a></li>
            <li><a th:href="@{/profile}">Profile</a></li>
            <li><a th:href="@{/logout}">Logout</a></li>
        </ul>
    </nav>

    <div class="hero-content">
        <p class="tag">Events</p>
        <h2>Choose Your Next Experience</h2>
    </div>

</header>

<main class="simple-main">

    <section class="simple-section">

        <h3>Available Events</h3>

        <p class="events-note">
            Browse all available events and choose your favorite experience.
        </p>

        <form class="search-form"th:action="@{/events/search}"method="get"
              style="display:flex; gap:12px; align-items:center; margin:20px 0;">

            <input type="text"
                   name="keyword"
                   placeholder="Search events..."
                   style="flex:1; max-width:420px; padding:14px 18px; border:none; border-radius:12px; background:#f4f7fc; font-size:15px; outline:none; box-shadow:0 2px 8px rgba(0,0,0,0.08);">

            <button type="submit"
                    class="btn btn-primary"
                    style="padding:14px 24px; border-radius:12px;">
                Search
            </button>

        </form>

        <div class="events-grid">

            <div class="event-card"
                 th:each="event : ${events}"
                 style="transition:0.3s; overflow:hidden; border:none; box-shadow:0 8px 24px rgba(0,0,0,0.08);">

                <img th:src="@{${event.imageUrl}}"
                     alt="Event Image"
                     style="height:220px; object-fit:cover;">

                <div class="event-body">

                    <h4 th:text="${event.title}"
                        style="margin-bottom:10px; font-size:22px;"></h4>

                    <p th:text="${event.location}"
                       style="margin-bottom:10px;"></p>

                    <p style="margin-bottom:18px; font-weight:600; color:#1f4ed8;">
                        Price: <span th:text="${event.price}"></span> EGP
                    </p>

                    <a class="btn btn-primary book-btn"th:href="@{/events/{id}(id=${event.id})}">
                        View Details
                    </a>

                </div>

            </div>

        </div>

    </section>

</main>

<footer class="footer">
    <p>TicketZone - Your trusted ticket booking platform.</p>
</footer>

</body>

</html>
