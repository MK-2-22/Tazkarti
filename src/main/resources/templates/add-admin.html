<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Admin - Tazkarti</title>
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>
    <div class="sidebar">
        <h2>Tazkarti Admin</h2>
        <a th:href="@{/admin/dashboard}" class="active">Dashboard</a>
        <a th:href="@{/admin/add-event}">+ New Event</a>
        <a th:href="@{/admin/add-admin}">+ New Admin</a>
    
        <a th:href="@{/home}">Back to Home</a>
    
        <a th:href="@{/logout}" style="margin-top: auto; border-top: 1px solid #34495e;">Logout</a>
    </div>

    <div class="main-content">
        <div class="card">
            <h1>Create New Administrator</h1>
            
            <div th:if="${error}" style="color: white; background: #e74c3c; padding: 10px; border-radius: 6px; margin-bottom: 15px;">
                <p th:text="${error}"></p>
            </div>

            <form th:action="@{/admin/save-admin}" th:object="${userDTO}" method="POST">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" th:field="*{name}" placeholder="Admin Name" required>
                </div>
                
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" th:field="*{email}" placeholder="admin@ticketzone.com" required>
                </div>
                
                <div class="form-group">
                    <label>Temporary Password</label>
                    <input type="password" th:field="*{password}" placeholder="Minimum 8 characters" required minlength="8">
                </div>
                
                <button type="submit" class="btn btn-save" style="background: #2c3e50; color: white;">Create Admin Account</button>
                <a th:href="@{/admin/dashboard}" style="margin-left:15px; text-decoration: none; color: #e74c3c;">Cancel</a>
            </form>
        </div>
    </div>
</body>
</html>
