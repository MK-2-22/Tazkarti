<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

    <nav th:fragment="navbar" class="nav">
        <h1 class="logo">TicketZone</h1>

        <ul class="nav-links">
            <li><a th:href="@{/home}">Home</a></li>
            <li><a th:href="@{/events}">Events</a></li>
            
            <th:block th:if="${session.loggedUser == null && session.admin == null}">
                <li><a th:href="@{/login}">Login</a></li>
                <li><a th:href="@{/register}">Sign Up</a></li>
            </th:block>

            <th:block th:if="${session.loggedUser != null}">
                <li><a th:href="@{/profile}">Profile</a></li>
                <li><a th:href="@{/logout}">Logout</a></li>
            </th:block>

            <th:block th:if="${session.admin != null && session.admin == true}">
                <li><a th:href="@{/admin-dashboard}">Admin Panel</a></li>
                <li><a th:href="@{/logout}">Logout</a></li>
            </th:block>
        </ul>
    </nav>

</body>
</html>
