<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Bookings</title>

    <link rel="stylesheet"
          th:href="@{/css/style.css}">
</head>

<body>

<header class="hero">

    <nav class="nav">

        <h1 class="logo">TicketZone</h1>

        <ul class="nav-links">
            <li><a th:href="@{/home}">Home</a></li>
            <li><a th:href="@{/events}">Events</a></li>
            <li><a th:href="@{/profile}">Profile</a></li>
            <li><a th:href="@{/logout}">Logout</a></li>
        </ul>

    </nav>

    <div class="hero-content">
        <p class="tag">Bookings</p>
        <h2>My Bookings</h2>
    </div>

</header>

<main class="simple-main">

    <section class="simple-section">

        <div class="events-grid">

            <div class="event-card custom-card"
                 th:each="booking : ${bookings}">

                <img th:src="@{${booking.event.imageUrl}}"
                     class="event-image">

                <div class="event-body">

                    <h3 th:text="${booking.event.title}"></h3>

                    <p>
                        Location:
                        <span th:text="${booking.event.location}"></span>
                    </p>

                    <p>
                        Tickets:
                        <span th:text="${booking.numberOfTickets}"></span>
                    </p>

                    <p>
                        Total:
                        <span th:text="${booking.totalPrice}"></span>
                        EGP
                    </p>

                    <p>
                        Date:
                        <span th:text="${booking.bookingDate}"></span>
                    </p>

                </div>

            </div>

        </div>

    </section>

</main>

<footer class="footer">
    <p>TicketZone - Your trusted ticket booking platform.</p>
</footer>

</body>

</html>
