<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Event - TicketZone Admin</title>
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>
<div class="sidebar">
    <h2>TicketZone Admin</h2>
    <a th:href="@{/admin/dashboard}" class="active">Dashboard</a>
    <a th:href="@{/admin/add-event}">+ New Event</a>
    <a th:href="@{/admin/add-admin}">+ New Admin</a>
    
    <a th:href="@{/home}">Back to Home</a>
    
    <a th:href="@{/logout}" style="margin-top: auto; border-top: 1px solid #34495e;">Logout</a>
</div>
    <div class="main-content">
        <div class="card">
            <h1>Edit Event Details</h1>
            <form th:action="@{/admin/save}" th:object="${event}" method="POST">
                <input type="hidden" th:field="*{id}">

                <div class="form-group">
                    <label>Event Name</label>
                    <input type="text" th:field="*{title}" required>
                </div>
                <div class="form-group">
                    <label>Location</label>
                    <input type="text" th:field="*{location}" required>
                </div>
                <div class="form-group">
                    <label>Price (EGP)</label>
                    <input type="number" step="0.01" th:field="*{price}" required>
                </div>
                <div class="form-group">
                    <label>Capacity</label>
                    <input type="number" th:field="*{capacity}" required>
                </div>
                <button type="submit" class="btn btn-save">Update Event</button>
                <a th:href="@{/admin/dashboard}" style="margin-left:15px;">Cancel</a>
            </form>
        </div>
    </div>
</body>
</html>
