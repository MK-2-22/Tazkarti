<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Register - Tazkarti</title>

    <link rel="stylesheet"
          th:href="@{/css/style.css}">
</head>

<body>

<header class="hero">

    <nav class="nav">
    <form th:action="@{/register}" th:object="${userDTO}" method="POST">
        <input type="text" th:field="*{name}" placeholder="Enter Name" required>
        <input type="email" th:field="*{email}" placeholder="Enter Email" required>
        <input type="password" th:field="*{password}" placeholder="Enter Password" required>

        <h1 class="logo">TicketZone</h1>

        <ul class="nav-links">
            <li><a th:href="@{/home}">Home</a></li>
            <li><a th:href="@{/events}">Events</a></li>
            <li><a th:href="@{/login}">Login</a></li>
        </ul>

    </nav>

    <div class="hero-content">
        <p class="tag">Join Us</p>
        <h2>Create Your Account</h2>
    </div>

</header>

<main class="simple-main">

    <section class="simple-section auth-wrap">

        <h3>Create Account</h3>

        <form action="/register"
              method="post"
              class="auth-form">

            <input type="text"
                   name="name"
                   placeholder="Enter Name"
                   required>

            <input type="email"
                   name="email"
                   placeholder="Enter Email"
                   required>

            <input type="password"
                   name="password"
                   placeholder="Enter Password"
                   required>

            <button type="submit"
                    class="btn btn-primary">
                Register
            </button>

        </form>

        <p>
            Already have an account?
            <a th:href="@{/login}">
                Login Here
            </a>
        </p>

    </section>

</main>

<footer class="footer">
    <p>TicketZone - Your trusted ticket booking platform.</p>
</footer>

</body>

</html>
