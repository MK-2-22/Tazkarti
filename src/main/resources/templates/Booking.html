<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TicketZone | Book Event</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

    <header class="hero" style="min-height: 200px;">
        <nav th:replace="~{navbar :: navbar}"></nav>
    </header>

    <main class="simple-main">
        <div class="container" style="max-width: 600px; margin-top: 50px;">
            <h2>Book Tickets</h2>
            <h3 th:text="${event.title}" style="color: #27ae60; margin-bottom: 20px;"></h3>

            <p th:if="${error}" th:text="${error}" class="error" style="color: red;"></p>

            <form th:action="@{/booking/payment}" method="GET">
                <input type="hidden" name="eventId" th:value="${event.id}">
                
                <div class="form-group">
                    <label>Price per Ticket (EGP):</label>
                    <input type="text" id="ticketPrice" th:value="${event.price}" readonly disabled style="background: #eee;">
                </div>

                <div class="form-group">
                    <label>Number of Tickets:</label>
                    <input type="number" id="tickets" name="tickets" value="1" min="1" th:max="${event.capacity}" required onchange="calculateTotal()">
                    <small>Available Capacity: <span th:text="${event.capacity}"></span></small>
                </div>

                <div class="form-group">
                    <label>Total Price (EGP):</label>
                    <input type="text" id="totalDisplay" th:value="${event.price}" readonly disabled style="background: #eee; font-weight: bold; color: #2c3e50;">
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%;">Proceed to Checkout</button>
                <a th:href="@{/events/{id}(id=${event.id})}" style="display: block; text-align: center; margin-top: 15px;">Cancel</a>
            </form>
        </div>
    </main>

    <footer th:replace="~{footer :: footer}"></footer>

    <script>
        function calculateTotal() {
            const price = parseFloat(document.getElementById('ticketPrice').value);
            const quantity = parseInt(document.getElementById('tickets').value);
            const total = price * quantity;
            document.getElementById('totalDisplay').value = total.toFixed(2);
        }
    </script>
</body>
</html>
