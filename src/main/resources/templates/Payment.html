<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TicketZone | Secure Checkout</title>
    <link rel="stylesheet" th:href="@{/css/events.css}">
    <link rel="stylesheet" th:href="@{/css/auth.css}">
</head>
<body>

    <header class="hero" style="min-height: 200px;">
        <nav th:replace="~{navbar :: navbar}"></nav>
    </header>

    <main class="simple-main">
        <div class="container" style="max-width: 600px; margin-top: 50px;">
            <h2>Secure Payment</h2>
            
            <div style="background: #f4f7f6; padding: 15px; border-radius: 8px; margin-bottom: 20px;">
                <p><strong>Event:</strong> <span th:text="${event.title}"></span></p>
                <p><strong>Tickets:</strong> <span th:text="${tickets}"></span></p>
                <p><strong>Amount Due:</strong> <span th:text="${totalPrice}" style="color: #27ae60; font-weight: bold;"></span> EGP</p>
            </div>

            <form th:action="@{/booking/confirm}" method="POST">
                <input type="hidden" name="eventId" th:value="${event.id}">
                <input type="hidden" name="tickets" th:value="${tickets}">
                
                <div class="form-group">
                    <label>Cardholder Name</label>
                    <input type="text" placeholder="John Doe" required>
                </div>
                
                <div class="form-group">
                    <label>Card Number</label>
                    <input type="text" placeholder="1234 5678 9101 1121" pattern="\d{16}" title="Enter 16 digit card number" required>
                </div>

                <div style="display: flex; gap: 10px;">
                    <div class="form-group" style="flex: 1;">
                        <label>Expiry (MM/YY)</label>
                        <input type="text" placeholder="12/26" required>
                    </div>
                    <div class="form-group" style="flex: 1;">
                        <label>CVV</label>
                        <input type="password" placeholder="123" pattern="\d{3,4}" required>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%;">Pay & Confirm Booking</button>
            </form>
        </div>
    </main>

    <footer th:replace="~{footer :: footer}"></footer>
</body>
</html>
