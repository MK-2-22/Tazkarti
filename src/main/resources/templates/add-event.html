<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Add New Event</title>
    <style>
        body { font-family: sans-serif; padding: 20px; line-height: 1.6; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; }
        input, textarea { width: 100%; padding: 8px; margin-top: 5px; }
        button { background: #27ae60; color: white; border: none; padding: 10px 20px; cursor: pointer; }
        .back-link { display: block; margin-top: 20px; color: #3498db; }
    </style>
</head>
<body>
    <h1>Create New Event</h1>
    
    <form th:action="@{/admin/save}" th:object="${event}" method="POST">
        
        <div class="form-group">
            <label>Event Title:</label>
            <input type="text" th:field="*{title}" required placeholder="e.g. Music Festival" />
        </div>

        <div class="form-group">
            <label>Location:</label>
            <input type="text" th:field="*{location}" placeholder="e.g. Cairo Opera House" />
        </div>

        <div class="form-group">
            <label>Price (EGP):</label>
            <input type="number" step="0.01" th:field="*{price}" required />
        </div>

        <div class="form-group">
            <label>Capacity:</label>
            <input type="number" th:field="*{capacity}" />
        </div>

        <div class="form-group">
            <label>Description:</label>
            <textarea th:field="*{description}" rows="4"></textarea>
        </div>

        <div class="form-group">
            <label>Image URL:</label>
            <input type="text" th:field="*{imageUrl}" placeholder="http://..." />
        </div>

        <button type="submit">Save Event</button>
    </form>

    <a class="back-link" th:href="@{/admin/dashboard}">← Back to Dashboard</a>
</body>
</html>
