<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Admin Dashboard</title>

    <link rel="stylesheet"
          th:href="@{/css/admin.css}">

</head>

<body>

<div class="sidebar">

    <h2>Admin Panel</h2>

    <a th:href="@{/admin/dashboard}">
        Dashboard
    </a>

    <a th:href="@{/admin/add-event}">
        Add Event
    </a>

    <a th:href="@{/logout}">
        Logout
    </a>

</div>

<div class="main-content">

    <div class="card">

        <div class="top-bar">

            <h1>Tazkarti Admin Panel</h1>

            <a th:href="@{/admin/add-event}"
               class="btn btn-add">
                + Add Event
            </a>

        </div>

        <table>

            <thead>

                <tr>
                    <th>Title</th>
                    <th>Location</th>
                    <th>Price</th>
                    <th>Actions</th>
                </tr>

            </thead>

            <tbody>

                <tr th:each="event : ${events}">

                    <td th:text="${event.title}"></td>

                    <td th:text="${event.location}"></td>

                    <td th:text="${event.price}"></td>

                    <td>

                        <a th:href="@{/admin/delete/{id}(id=${event.id})}"
                           class="btn btn-delete"
                           onclick="return confirm('Are you sure?')">
                            Delete
                        </a>

                    </td>

                </tr>

            </tbody>

        </table>

    </div>

    <div class="card">

        <h2>Send Email</h2>

        <form th:action="@{/admin/send-email}"
              method="post">

            <div class="form-group">

                <label>Email</label>

                <input type="email"
                       name="to"
                       required>

            </div>

            <div class="form-group">

                <label>Subject</label>

                <input type="text"
                       name="subject"
                       required>

            </div>

            <div class="form-group">

                <label>Message</label>

                <textarea name="body"
                          rows="5"
                          required></textarea>

            </div>

            <button type="submit"
                    class="btn btn-send">
                Send Email
            </button>

        </form>

    </div>

</div>

</body>

</html>
